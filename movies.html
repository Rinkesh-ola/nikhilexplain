<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movies - Nikhil Explain House</title>
  <link rel="icon" href="favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--red:#e50914;--dark:#0a0a0a;--card-bg:#141414;--surface:#1c1c1c;--text:#f5f5f1;--muted:#999;--gold:#f5c518}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--dark);color:var(--text);font-family:'Poppins',sans-serif;min-height:100vh;overflow-x:hidden}
    nav{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,#000 0%,transparent 100%);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid #ffffff10}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--text);text-decoration:none}
    .logo span{color:var(--red)}
    .nav-links{display:flex;gap:28px;list-style:none}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.85rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:var(--text)}
    .nav-links a.active{border-bottom:2px solid var(--red);padding-bottom:2px}
    .search-bar{display:flex;align-items:center;background:var(--surface);border:1px solid #ffffff15;border-radius:24px;padding:6px 16px;gap:8px}
    .search-bar input{background:none;border:none;outline:none;color:var(--text);font-family:'Poppins',sans-serif;font-size:.85rem;width:180px}
    .search-bar input::placeholder{color:var(--muted)}
    .page-header{padding:48px 40px 24px}
    .page-header h1{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:3px}
    .page-header h1 span{color:var(--red)}
    .page-header p{color:var(--muted);margin-top:8px;font-size:.9rem}
    .genre-pills{display:flex;gap:10px;flex-wrap:wrap;padding:0 40px 32px}
    .pill{background:var(--surface);border:1px solid #ffffff15;color:var(--muted);padding:7px 20px;border-radius:20px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
    .pill:hover,.pill.active{background:var(--red);color:#fff;border-color:var(--red)}
    .movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;padding:0 40px 48px}
    .movie-card{background:var(--card-bg);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;border:1px solid #ffffff08}
    .movie-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 20px 50px #e5091430;border-color:#e5091440;z-index:10;position:relative}
    .movie-thumb{position:relative;aspect-ratio:2/3;overflow:hidden}
    .movie-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem}
    .play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s}
    .movie-card:hover .play-overlay{opacity:1}
    .play-btn{width:56px;height:56px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px #e50914aa}
    .play-btn svg{margin-left:4px}
    .free-badge{position:absolute;top:10px;left:10px;background:#00c853;color:#fff;font-size:.65rem;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:3px}
    .movie-info{padding:12px 14px 14px}
    .movie-title{font-size:.9rem;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .movie-meta{display:flex;align-items:center;gap:10px;font-size:.75rem;color:var(--muted)}
    .rating{color:var(--gold);font-weight:600}
    .movie-genre{font-size:.7rem;color:var(--muted);margin-top:5px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px)}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--card-bg);border-radius:12px;width:100%;max-width:760px;border:1px solid #ffffff15;overflow:hidden;transform:scale(.95);transition:transform .3s;box-shadow:0 40px 100px #000}
    .modal-overlay.open .modal{transform:scale(1)}
    .modal-video{width:100%;aspect-ratio:16/9;background:#000}
    .modal-video iframe{width:100%;height:100%;border:none}
    .modal-body{padding:20px 24px 24px}
    .modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1px}
    .modal-close{background:#ffffff15;border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
    .modal-close:hover{background:var(--red)}
    .modal-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .modal-tag{font-size:.7rem;padding:3px 10px;border-radius:20px;background:#ffffff12;color:var(--muted)}
    .modal-desc{font-size:.85rem;color:#aaa;line-height:1.7}
    footer{border-top:1px solid #ffffff10;padding:28px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .footer-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px}
    .footer-logo span{color:var(--red)}
    .footer-links{display:flex;gap:20px}
    .footer-links a{font-size:.75rem;color:var(--muted);text-decoration:none}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .movie-card{animation:fadeUp .4s ease both}
    @media(max-width:700px){nav{padding:14px 20px}.nav-links{display:none}.page-header,.genre-pills,.movie-grid{padding-left:20px;padding-right:20px}footer{flex-direction:column;text-align:center}}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Nikhil <span>Explain</span> House</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="movies.html" class="active">Movies</a></li>
    <li><a href="new.html">New</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
  <div class="search-bar">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Search movies..." id="searchInput" oninput="filterMovies()"/>
  </div>
</nav>
<div class="page-header">
  <h1>All <span>Movies</span></h1>
  <p>All movies are completely free to watch on YouTube</p>
</div>
<div class="genre-pills">
  <div class="pill active" onclick="filterByGenre('All',this)">🌟 All</div>
  <div class="pill" onclick="filterByGenre('Action',this)">💥 Action</div>
  <div class="pill" onclick="filterByGenre('Comedy',this)">😂 Comedy</div>
  <div class="pill" onclick="filterByGenre('Drama',this)">🎭 Drama</div>
  <div class="pill" onclick="filterByGenre('Thriller',this)">🔥 Thriller</div>
  <div class="pill" onclick="filterByGenre('Horror',this)">👻 Horror</div>
  <div class="pill" onclick="filterByGenre('Romance',this)">❤️ Romance</div>
  <div class="pill" onclick="filterByGenre('Family',this)">👨‍👩‍👧 Family</div>
</div>
<div class="movie-grid" id="movieGrid"></div>
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-video" id="modalVideo"></div>
    <div class="modal-body">
      <div class="modal-header"><div class="modal-title" id="modalTitle"></div><button class="modal-close" onclick="closeModalBtn()">✕</button></div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-desc" id="modalDesc"></div>
    </div>
  </div>
</div>
<footer>
  <div class="footer-logo">Nikhil <span>Explain</span> House</div>
  <div class="footer-links"><a href="privacy-policy.html">Privacy Policy</a><a href="about.html">About</a></div>
  <div style="font-size:.75rem;color:var(--muted)">Free Movies 🎬</div>
</footer>
<script src="movies-data.js"></script>
<script>
  let activeGenre='All',searchTerm='';
  function renderMovies(data){const f=data.filter(m=>(activeGenre==='All'||m.genre===activeGenre)&&m.title.toLowerCase().includes(searchTerm.toLowerCase()));document.getElementById('movieGrid').innerHTML=f.length===0?`<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:60px 0">No movies found 😕</div>`:f.map(m=>`<div class="movie-card" onclick="openModal(${m.id})"><div class="movie-thumb"><div class="movie-thumb-placeholder" style="background:${m.bg}">${m.emoji}</div><div class="play-overlay"><div class="play-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div></div><div class="free-badge">FREE</div></div><div class="movie-info"><div class="movie-title">${m.title}</div><div class="movie-meta"><span class="rating">⭐ ${m.rating}</span><span>${m.year}</span></div><div class="movie-genre">${m.genre}</div></div></div>`).join('');}
  function filterByGenre(g,el){activeGenre=g;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderMovies(window.moviesData);}
  function filterMovies(){searchTerm=document.getElementById('searchInput').value;renderMovies(window.moviesData);}
  function openModal(id){const m=window.moviesData.find(x=>x.id===id);document.getElementById('modalTitle').textContent=m.title;document.getElementById('modalDesc').textContent=m.desc;document.getElementById('modalTags').innerHTML=m.tags.map(t=>`<span class="modal-tag">${t}</span>`).join('');document.getElementById('modalVideo').innerHTML=`<iframe src="https://www.youtube.com/embed/${m.youtubeId}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;document.getElementById('modal').classList.add('open');document.body.style.overflow='hidden';}
  function closeModalBtn(){document.getElementById('modal').classList.remove('open');document.getElementById('modalVideo').innerHTML='';document.body.style.overflow='';}
  function closeModal(e){if(e.target===document.getElementById('modal'))closeModalBtn();}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalBtn();});
  renderMovies(window.moviesData);
</script>
</body>
</html>
